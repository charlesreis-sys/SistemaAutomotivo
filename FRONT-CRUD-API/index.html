<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Sistema de Veículos</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>🚗 UniFecaf - PROJETO DE SISTEMA AUTOMOTIVO – GESTÃO DE ESTOQUE DE VEÍCULO</h1>
        </header>

        <div class="form-container">
            <h2 style="grid-column: 1/-1; margin-bottom: 10px;">Cadastrar Veículo</h2>
            <input type="text" id="marcaInput" placeholder="Marca (ex: Toyota)">
            <input type="text" id="modeloInput" placeholder="Modelo (ex: Corolla)">
            <input type="number" id="anoInput" placeholder="Ano">
            <input type="text" id="corInput" placeholder="Cor">
            <input type="number" id="precoInput" placeholder="Preço (ex: 80000)">
            <input type="number" id="kmInput" placeholder="Quilometragem">
            <input type="number" id="estoqueInput" placeholder="Qtd. em Estoque">
            <button onclick="addVeiculo()">Cadastrar</button>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Pesquisar marca, modelo, cor ou status...">
            <button onclick="filterAvailable()" class="btn-filter">Somente Disponíveis</button>
            <button onclick="clearSearch()" class="btn-clear">Limpar</button>
        </div>

        <section id="cardContainer"></section>
    </div>

    <script src="./js/script.js"></script>
</body>

</html>
