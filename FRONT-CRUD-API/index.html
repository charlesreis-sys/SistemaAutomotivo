<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Frota</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Sistema de Gestão de Veículos</h1>
        </header>

        <div class="form-container">
            <h2>Cadastrar / Editar Veículo</h2>
            
            <input type="text" id="marcaInput" placeholder="Marca (ex: Toyota)">
            <input type="text" id="modeloInput" placeholder="Modelo (ex: Corolla)">
            <input type="number" id="anoInput" placeholder="Ano de Fabricação">
            <input type="text" id="corInput" placeholder="Cor">
            <input type="number" id="kmInput" placeholder="Quilometragem">
            <input type="number" id="precoInput" placeholder="Preço (R$)">
            <input type="number" id="estoqueInput" placeholder="Quantidade em Estoque">
            
            <select id="statusInput">
                <option value="" disabled selected>Status do Veículo</option>
                <option value="Disponível">Disponível</option>
                <option value="Vendido">Vendido</option>
                <option value="Manutenção">Manutenção</option>
            </select>

            <button onclick="addVeiculo()">Adicionar Veículo</button>
        </div>

        <hr>

        <section id="cardContainer" class="card-container">
            </section>
    </div>

    <script src="./js/script.js"></script>
</body>

</html>
