# Configurações do DataSource (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/db_concessionaria
spring.datasource.username=root
spring.datasource.password=Aluno
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuração do JPA
spring.jpa.hibernate.ddl-auto=update

# 'update' cria/atualizar as tabelas com base nas entidades
spring.jpa.datasource.-platform=org.hibernate.dialect.MySQL5Dialect

# Configuração para monstrar as queries SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true